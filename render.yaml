services:
  - type: web
    name: capstone-crop-scanner
    env: python
    buildCommand: |
      pip install -r requirements.txt
      npm install
      npm run build
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --timeout 120 --workers 1
    envVars:
      - key: GEMINI_API_KEY
        sync: false
    disk:
      name: capstone-data
      mountPath: /opt/render/project/src
      sizeGB: 1
